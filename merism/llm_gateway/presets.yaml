# LLM Gateway presets — UX quick-fill for the admin "Add Provider" wizard.
#
# These are NOT architecture-level config. A user can always hand-fill
# base_url + model + api_key without selecting a preset. Presets just
# save typing for common providers.
#
# Fields:
#   label       — shown in the dropdown
#   protocol    — "http" or "ws"
#   base_url    — default base URL (user can override)
#   model       — default model ID (user can override)
#   serves      — which logical_name(s) this preset is typically used for

# ═══════════════════════════════════════════════════════════════════════
# HTTP providers (routed through LiteLLM)
# ═══════════════════════════════════════════════════════════════════════

- label: DeepSeek · Chat
  protocol: http
  base_url: https://api.deepseek.com
  model: deepseek-chat
  serves: [chat]

- label: DeepSeek · Reasoner
  protocol: http
  base_url: https://api.deepseek.com
  model: deepseek-reasoner
  serves: [reasoner]

