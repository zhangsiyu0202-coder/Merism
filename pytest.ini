[pytest]
# Merism test entry — there is only one boundary, and it's this.
#
# Run:
#     pytest merism/tests
#     pytest merism/<domain>/tests/
#     pytest -k <keyword>
#
# merism-app is deliberately unified — no split between a "lightweight" and an
# "ORM-backed" entry. The test settings use sqlite :memory: and locmem cache,
# so every test runs fast with no external services.
minversion = 8.0
pythonpath = .
env =
    TEST=1
    DJANGO_SETTINGS_MODULE=merism.settings.test

python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Include the Merism pytest plugin registering markers (merism_llm_live,
# merism_im_live, merism_slow) and their auto-skip behaviour.
addopts =
    -p merism.testing.pytest_plugin
    -ra
    --strict-markers
    --tb=short

asyncio_mode = auto
asyncio_default_fixture_loop_scope = module
asyncio_default_test_loop_scope = module

filterwarnings =
    ignore::DeprecationWarning:celery.*
    ignore::DeprecationWarning:kombu.*
