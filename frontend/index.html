<!doctype html>
<html lang="en" class="h-full">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Merism</title>
        <!--
            Fonts are loaded via @fontsource-variable/inter+geist CSS
            imports in src/lib/merism/fonts/fonts.css. We do NOT use a
            <link rel="preload"> here because Vite rewrites woff2 URLs
            on the fly and the preload URL would never match the actual
            fetched URL — browser would log "preloaded but not used".
            font-display: swap on the @font-face rules handles FOIT.
        -->
    </head>
    <body class="h-full bg-merism-bg text-merism-text font-merism-sans antialiased">
        <div id="root" class="h-full"></div>
        <script type="module" src="/src/index.tsx"></script>
    </body>
</html>
